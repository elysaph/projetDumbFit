<!doctype html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil | DumbFit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div id="app">
        <header class="topbar">
            <div class="wrap topbar-row">
                <a class="brand" href="index.html">DumbFit</a>
                <nav class="menu" aria-label="Navigation principale">
                    <a class="menu-link" href="index.html">Tableau de bord</a>
                    <a class="menu-link active" href="profile.html">Profil</a>
                    <a class="menu-cta" href="create-account.html">Créer un compte</a>
                </nav>
            </div>
        </header>

        <main class="wrap auth-page">
            <section class="auth-card profile-card" aria-labelledby="profile-title">
                <h1 id="profile-title">Modifier le profil</h1>
                <p>Mettez à jour vos informations personnelles et les paramètres du compte.</p>

                <form id="profile-form" class="form-grid">
                    <h2 class="form-section-title">Informations personnelles</h2>

                    <div class="split-fields">
                        <div class="field">
                            <label for="first-name">Prénom</label>
                            <input id="first-name" name="firstName" type="text" autocomplete="given-name" value=""
                                required>
                        </div>
                        <div class="field">
                            <label for="last-name">Nom</label>
                            <input id="last-name" name="lastName" type="text" autocomplete="family-name" value=""
                                required>
                        </div>
                    </div>

                    <div class="field">
                        <label for="profile-email">Adresse e-mail</label>
                        <input id="profile-email" name="email" type="email" autocomplete="email" value="" required>
                    </div>

                    <div class="field">
                        <label for="phone">Téléphone</label>
                        <input id="phone" name="phone" type="tel" autocomplete="tel" value="">
                    </div>

                    <h2 class="form-section-title">Informations du compte</h2>

                    <div class="field">
                        <label for="username">Nom d'utilisateur</label>
                        <input id="username" name="username" type="text" autocomplete="username" value="" required>
                    </div>

                    <div class="field">
                        <label for="new-password">Nouveau mot de passe</label>
                        <input id="new-password" name="newPassword" type="password" minlength="8"
                            placeholder="Laissez vide pour conserver le mot de passe actuel">
                    </div>

                    <div class="field">
                        <label for="confirm-new-password">Confirmer le nouveau mot de passe</label>
                        <input id="confirm-new-password" name="confirmNewPassword" type="password" minlength="8"
                            placeholder="Saisissez à nouveau le nouveau mot de passe">
                    </div>

                    <div class="form-actions">
                        <button class="btn" type="submit">Enregistrer les modifications</button>
                        <a class="link-btn" href="index.html">Retour au tableau de bord</a>
                    </div>

                    <p id="profile-note" class="form-note" aria-live="polite"></p>
                </form>
            </section>
        </main>
    </div>

    <script src="script.js" defer></script>
</body>

</html>
